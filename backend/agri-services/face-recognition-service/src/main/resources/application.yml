server:
  port: 8090

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://47.108.58.107:3306/dream6?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:c0765083cd3f57ab}
    hikari:
      initialization-fail-timeout: -1
  application:
    name: face-recognition-service
  jpa:
    database-platform: ${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.community.dialect.MySQLLegacyDialect}
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false
  flyway:
    enabled: ${APP_FLYWAY_ENABLED:false}
    locations: classpath:db/migration
    table: flyway_schema_history_face_recognition
    baseline-on-migrate: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html

face-recognition:
  # ONNX 模型路径（绝对路径或相对于工作目录的路径）
  # ArcFace ResNet-100 (ONNX Model Zoo, LFW 99.77%, 512-dim embedding, 112x112 input)
  model-path: ${FACE_MODEL_PATH:face/arcface/arcfaceresnet100-8.onnx}
  # 人脸匹配相似度阈值 (余弦相似度 0~1)，值越高越严格
  # ArcFace 推荐 0.4~0.5，ResNet-100 区分度高
  similarity-threshold: ${FACE_SIMILARITY_THRESHOLD:0.45}
  # 上传的人脸图片存储目录
  storage-path: ${FACE_STORAGE_PATH:data/face-images}
